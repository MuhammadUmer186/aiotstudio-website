services:
  backend:
    build:
      context: ./server
    container_name: iot-ai-backend
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_NAME: ${APP_NAME:-IoT & AI Services}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/app.db}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://your-domain.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      args:
        VITE_API_BASE: ${VITE_API_BASE:-}
    container_name: iot-ai-frontend
    depends_on:
      - backend
    restart: unless-stopped
